name: offline
description: A virtual pet that grows when you stay offline.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  # usage_stats: ^1.3.1  # DISABLED: incompatible with SDK 35, using native Method Channel instead
  # flutter_foreground_task: ^6.1.0  # REMOVED: not needed, using simple Timer-based monitoring
  permission_handler: ^12.0.1
  animations: ^2.0.0
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
